name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

permissions: {}

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJson('["OWNER", "MEMBER"]'), github.event.comment.author_association)
      ) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        contains(fromJson('["OWNER", "MEMBER"]'), github.event.review.author_association)
      ) ||
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJson('["OWNER", "MEMBER"]'), github.event.comment.author_association)
      ) ||
      (github.event_name == 'issues' &&
        (github.event.label.name == 'claude' ||
        contains(github.event.issue.body, '@claude') ||
        contains(github.event.issue.title, '@claude'))
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            **WHEN WORKING ON ISSUES:**
            After implementing changes and committing, create a pull request:
            ```
            gh pr create --title "Your descriptive title" --body "## Summary
            Your summary of what was implemented.

            Closes #${{ github.event.issue.number }}"
            ```
            Always include a summary AND "Closes #${{ github.event.issue.number }}" in the body.

            **COMMIT RULES:**
            - Do NOT add "Co-authored-by" lines to commits
            - Do NOT add "Generated with Claude Code" or similar attributions
            - Keep commits clean and professional

            **WHEN WORKING ON PR FEEDBACK:**
            Make the requested changes and commit. Do NOT create a new PR.

            **WHEN FIXING CI FAILURES:**
            Fix the issues and commit. CI will re-run automatically.

            **COMMIT MESSAGE RULES (max 72 chars):**
            - Imperative mood: "Add" not "Added"
            - Action verbs: Add, Update, Fix, Remove, Refactor, Implement
            - No articles (a, an, the)
            - No punctuation at end
            - No prefixes like "feat:", "fix:"
            - Single line only
            - NO co-author attributions

          track_progress: true
          claude_args: |
            --model "claude-sonnet-4-6"
            --max-turns 50
            --allowedTools "Bash(git:*),Bash(gh issue:*),Bash(gh pr:*),
            Bash(gh repo:*),Edit,Write,Read,Glob,Grep,LS,WebSearch,WebFetch"

      - name: Clean up Claude comment
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            --jq '.[-1].id')
          if [ -n "$COMMENT_ID" ]; then
            BODY=$(gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID --jq '.body')
            CLEANED=$(echo "$BODY" | sed 's/ • \[Create PR ➔\]([^)]*)//g' | sed 's/[[:space:]]*|[[:space:]]*$//')
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -X PATCH \
              -f body="$CLEANED"
          fi
