schemaVersion: 1
identifier: github-planner
displayName: GitHub Planner
description: >-
  Project management toolkit for GitHub. Creates issues from planning documents,
  organizes epics as GitHub Projects (v2), triages backlogs, tracks delivery progress,
  and provides developer workload insights — all through Claude Code.
author: anettodev
minMCSVersion: "2026.3.0"

# ---------------------------------------------------------------------------
# Prompts — resolved interactively during `mcs configure`
# ---------------------------------------------------------------------------
prompts:
  - key: GITHUB_REPO
    type: input
    label: "GitHub repository (owner/repo format):"
    default: __REPO_NAME__

  - key: LABEL_PREFIX
    type: input
    label: "Prefix for auto-created labels (empty for none):"
    default: ""

  - key: DEFAULT_ASSIGNEE
    type: input
    label: "Default issue assignee (GitHub username, empty to skip):"
    default: ""

  - key: STALE_THRESHOLD
    type: input
    label: "Stale issue threshold in days (issues idle longer than this are flagged):"
    default: "14"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # ── Dependencies ────────────────────────────────────────────────────────
  - id: gh
    displayName: GitHub CLI
    description: GitHub CLI for issue, label, and milestone management
    brew: gh
    doctorChecks:
      - type: commandExists
        name: GitHub CLI
        section: Dependencies
        command: gh

  - id: jq
    description: JSON processor (used by session hook)
    brew: jq

  # ── Skill: plan-to-issues ──────────────────────────────────────────────
  - id: plan-to-issues
    description: >-
      Parses planning documents and extracts actionable tasks.
      Maps priorities, phases, and dependencies to GitHub labels and milestones.
      Includes issue body templates (refactoring, cleanup, bug, feature).
    skill:
      source: src/skills/plan-to-issues
      destination: plan-to-issues

  # ── Agent: github-planner ──────────────────────────────────────────────
  - id: github-planner-agent
    description: Creates GitHub Issues from extracted tasks using gh CLI
    dependencies: [gh]
    agent:
      source: src/agents/github-planner.md
      destination: github-planner.md

  # ── Command: /plan-issues ──────────────────────────────────────────────
  - id: plan-issues
    description: "Parse a document and create GitHub Issues with /plan-issues <path>"
    dependencies: [gh, plan-to-issues, github-planner-agent]
    command:
      source: src/commands/plan-issues.md
      destination: plan-issues.md

  # ── Command: /plan-preview ─────────────────────────────────────────────
  - id: plan-preview
    description: "Preview issues that would be created (dry run) with /plan-preview <path>"
    dependencies: [plan-to-issues]
    command:
      source: src/commands/plan-preview.md
      destination: plan-preview.md

  # ── Skill: epic-to-project ──────────────────────────────────────────────
  - id: epic-to-project
    description: >-
      Parses planning documents and extracts project-level structure.
      Maps phases and priorities to GitHub Project v2 custom fields.
      Defines standard field schemas for Priority, Phase, and Status.
    skill:
      source: src/skills/epic-to-project
      destination: epic-to-project

  # ── Skill: issue-triage ────────────────────────────────────────────────
  - id: issue-triage-skill
    description: >-
      Analyzes open GitHub issues for organization problems.
      Evaluates priorities, UX impact, staleness, duplicates, and backlog health.
      Produces PM-level insights and actionable recommendations.
    skill:
      source: src/skills/issue-triage
      destination: issue-triage

  # ── Agent: github-project-manager ──────────────────────────────────────
  - id: github-project-manager-agent
    description: Creates and configures GitHub Projects (v2), links issues, and sets custom field values
    dependencies: [gh]
    agent:
      source: src/agents/github-project-manager.md
      destination: github-project-manager.md

  # ── Agent: issue-analyst ───────────────────────────────────────────────
  - id: issue-analyst-agent
    description: Fetches and analyzes open GitHub issues for triage. Read-only by default.
    dependencies: [gh]
    agent:
      source: src/agents/issue-analyst.md
      destination: issue-analyst.md

  # ── Command: /plan-epic ────────────────────────────────────────────────
  - id: plan-epic
    description: "Create a GitHub Project (v2) from a planning document with /plan-epic <path>"
    dependencies: [gh, epic-to-project, github-project-manager-agent, plan-to-issues, github-planner-agent]
    command:
      source: src/commands/plan-epic.md
      destination: plan-epic.md

  # ── Command: /issue-triage ─────────────────────────────────────────────
  - id: issue-triage
    description: "Scan and triage open issues with /issue-triage"
    dependencies: [gh, issue-triage-skill, issue-analyst-agent, github-planner-agent]
    command:
      source: src/commands/issue-triage.md
      destination: issue-triage.md

  # ── Skill: discussion-builder ───────────────────────────────────────────
  - id: discussion-builder
    description: >-
      Builds structured GitHub Discussions from user input or documents.
      Supports 6 types: decisions, design proposals, retros, post-mortems,
      distribution analyses, and evaluations/analyses.
    skill:
      source: src/skills/discussion-builder
      destination: discussion-builder

  # ── Agent: discussion-manager ──────────────────────────────────────────
  - id: discussion-manager-agent
    description: Creates GitHub Discussions and maintains the Knowledge Manifest with 20KB cap and yearly archival
    dependencies: [gh]
    agent:
      source: src/agents/discussion-manager.md
      destination: discussion-manager.md

  # ── Command: /plan-discussion ──────────────────────────────────────────
  - id: plan-discussion
    description: "Create a GitHub Discussion with /plan-discussion [path] [--type TYPE]"
    dependencies: [gh, discussion-builder, discussion-manager-agent]
    command:
      source: src/commands/plan-discussion.md
      destination: plan-discussion.md

  # ── Skill: plan-insights ────────────────────────────────────────────────
  - id: plan-insights-skill
    description: >-
      Project delivery metrics — milestone burndown, delivery pipeline,
      stale work detection, and project health dashboard.
    skill:
      source: src/skills/plan-insights
      destination: plan-insights

  # ── Skill: dev360-insights ────────────────────────────────────────────
  - id: dev360-insights-skill
    description: >-
      Developer workload and team health analysis. Focused on balance
      and sustainability — not productivity surveillance. No leaderboards.
    skill:
      source: src/skills/dev360-insights
      destination: dev360-insights

  # ── Agent: plan-insights-analyst ───────────────────────────────────────
  - id: plan-insights-analyst-agent
    description: Analyzes project delivery metrics — burndown, pipeline, stale work, health. Read-only.
    dependencies: [gh]
    agent:
      source: src/agents/plan-insights-analyst.md
      destination: plan-insights-analyst.md

  # ── Agent: dev360-analyst ──────────────────────────────────────────────
  - id: dev360-analyst-agent
    description: Analyzes developer activity and team health. Workload balance, not surveillance. Read-only.
    dependencies: [gh]
    agent:
      source: src/agents/dev360-analyst.md
      destination: dev360-analyst.md

  # ── Command: /plan-insights ────────────────────────────────────────────
  - id: plan-insights
    description: "Project delivery insights with /plan-insights [--scope burndown|pipeline|stale|health]"
    dependencies: [gh, plan-insights-skill, plan-insights-analyst-agent]
    command:
      source: src/commands/plan-insights.md
      destination: plan-insights.md

  # ── Command: /dev360-insights ──────────────────────────────────────────
  - id: dev360-insights
    description: "Developer workload and health insights with /dev360-insights [--dev @user]"
    dependencies: [gh, dev360-insights-skill, dev360-analyst-agent]
    command:
      source: src/commands/dev360-insights.md
      destination: dev360-insights.md

  # ── Hook: session start — verify gh auth ───────────────────────────────
  - id: gh-auth-check
    displayName: GitHub auth check
    description: Verifies GitHub CLI authentication and reports repo context on session start
    dependencies: [gh, jq]
    hookEvent: SessionStart
    hookTimeout: 10
    hook:
      source: src/hooks/gh-auth-check.sh
      destination: github-planner/gh-auth-check.sh

  # ── Settings ───────────────────────────────────────────────────────────
  - id: settings
    displayName: Settings
    description: Permissions for gh CLI commands
    isRequired: true
    settingsFile: src/config/settings.json

  # ── Gitignore ──────────────────────────────────────────────────────────
  - id: gitignore
    description: Gitignore entries for cache files
    isRequired: true
    gitignore:
      - .github-planner-cache

# ---------------------------------------------------------------------------
# Templates — CLAUDE.local.md sections
# ---------------------------------------------------------------------------
templates:
  - sectionIdentifier: github-planner
    placeholders:
      - __GITHUB_REPO__
      - __LABEL_PREFIX__
      - __DEFAULT_ASSIGNEE__
    contentFile: src/templates/instructions.md

# ---------------------------------------------------------------------------
# Supplementary doctor checks
# ---------------------------------------------------------------------------
supplementaryDoctorChecks:
  - type: shellScript
    name: GitHub CLI authenticated
    section: Authentication
    command: src/hooks/gh-auth-check-doctor.sh
    fixCommand: "gh auth login --scopes repo"
