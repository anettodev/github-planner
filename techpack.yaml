schemaVersion: 1
identifier: github-planner
displayName: GitHub Planner
description: >-
  Project management toolkit for GitHub. Creates issues from planning documents,
  organizes epics as GitHub Projects (v2), and triages backlogs with PM-level insights
  on priority, UX impact, and project health.
author: anettodev
minMCSVersion: "2026.3.0"

# ---------------------------------------------------------------------------
# Prompts — resolved interactively during `mcs configure`
# ---------------------------------------------------------------------------
prompts:
  - key: GITHUB_REPO
    type: input
    label: "GitHub repository (owner/repo format):"
    default: __REPO_NAME__

  - key: LABEL_PREFIX
    type: input
    label: "Prefix for auto-created labels (empty for none):"
    default: ""

  - key: DEFAULT_ASSIGNEE
    type: input
    label: "Default issue assignee (GitHub username, empty to skip):"
    default: ""

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  # ── Dependencies ────────────────────────────────────────────────────────
  - id: gh
    displayName: GitHub CLI
    description: GitHub CLI for issue, label, and milestone management
    brew: gh
    doctorChecks:
      - type: commandExists
        name: GitHub CLI
        section: Dependencies
        command: gh

  - id: jq
    description: JSON processor (used by session hook)
    brew: jq

  # ── Skill: plan-to-issues ──────────────────────────────────────────────
  - id: plan-to-issues
    description: >-
      Parses planning documents and extracts actionable tasks.
      Maps priorities, phases, and dependencies to GitHub labels and milestones.
      Includes issue body templates (refactoring, cleanup, bug, feature).
    skill:
      source: skills/plan-to-issues
      destination: plan-to-issues

  # ── Agent: github-planner ──────────────────────────────────────────────
  - id: github-planner-agent
    description: Creates GitHub Issues from extracted tasks using gh CLI
    dependencies: [gh]
    agent:
      source: agents/github-planner.md
      destination: github-planner.md

  # ── Command: /plan-issues ──────────────────────────────────────────────
  - id: plan-issues
    description: "Parse a document and create GitHub Issues with /plan-issues <path>"
    dependencies: [gh, plan-to-issues, github-planner-agent]
    command:
      source: commands/plan-issues.md
      destination: plan-issues.md

  # ── Command: /plan-preview ─────────────────────────────────────────────
  - id: plan-preview
    description: "Preview issues that would be created (dry run) with /plan-preview <path>"
    dependencies: [plan-to-issues]
    command:
      source: commands/plan-preview.md
      destination: plan-preview.md

  # ── Skill: epic-to-project ──────────────────────────────────────────────
  - id: epic-to-project
    description: >-
      Parses planning documents and extracts project-level structure.
      Maps phases and priorities to GitHub Project v2 custom fields.
      Defines standard field schemas for Priority, Phase, and Status.
    skill:
      source: skills/epic-to-project
      destination: epic-to-project

  # ── Skill: issue-triage ────────────────────────────────────────────────
  - id: issue-triage-skill
    description: >-
      Analyzes open GitHub issues for organization problems.
      Evaluates priorities, UX impact, staleness, duplicates, and backlog health.
      Produces PM-level insights and actionable recommendations.
    skill:
      source: skills/issue-triage
      destination: issue-triage

  # ── Agent: github-project-manager ──────────────────────────────────────
  - id: github-project-manager-agent
    description: Creates and configures GitHub Projects (v2), links issues, and sets custom field values
    dependencies: [gh]
    agent:
      source: agents/github-project-manager.md
      destination: github-project-manager.md

  # ── Agent: issue-analyst ───────────────────────────────────────────────
  - id: issue-analyst-agent
    description: Fetches and analyzes open GitHub issues for triage. Read-only by default.
    dependencies: [gh]
    agent:
      source: agents/issue-analyst.md
      destination: issue-analyst.md

  # ── Command: /plan-epic ────────────────────────────────────────────────
  - id: plan-epic
    description: "Create a GitHub Project (v2) from a planning document with /plan-epic <path>"
    dependencies: [gh, epic-to-project, github-project-manager-agent, plan-to-issues, github-planner-agent]
    command:
      source: commands/plan-epic.md
      destination: plan-epic.md

  # ── Command: /issue-triage ─────────────────────────────────────────────
  - id: issue-triage
    description: "Scan and triage open issues with /issue-triage"
    dependencies: [gh, issue-triage-skill, issue-analyst-agent, github-planner-agent]
    command:
      source: commands/issue-triage.md
      destination: issue-triage.md

  # ── Hook: session start — verify gh auth ───────────────────────────────
  - id: gh-auth-check
    displayName: GitHub auth check
    description: Verifies GitHub CLI authentication and reports repo context on session start
    dependencies: [gh, jq]
    hookEvent: SessionStart
    hookTimeout: 10
    hook:
      source: hooks/gh-auth-check.sh
      destination: github-planner/gh-auth-check.sh

  # ── Settings ───────────────────────────────────────────────────────────
  - id: settings
    displayName: Settings
    description: Permissions for gh CLI commands
    isRequired: true
    settingsFile: config/settings.json

  # ── Gitignore ──────────────────────────────────────────────────────────
  - id: gitignore
    description: Gitignore entries for cache files
    isRequired: true
    gitignore:
      - .github-planner-cache

# ---------------------------------------------------------------------------
# Templates — CLAUDE.local.md sections
# ---------------------------------------------------------------------------
templates:
  - sectionIdentifier: github-planner
    placeholders:
      - __GITHUB_REPO__
      - __LABEL_PREFIX__
      - __DEFAULT_ASSIGNEE__
    contentFile: templates/instructions.md

# ---------------------------------------------------------------------------
# Supplementary doctor checks
# ---------------------------------------------------------------------------
supplementaryDoctorChecks:
  - type: shellScript
    name: GitHub CLI authenticated
    section: Authentication
    command: hooks/gh-auth-check-doctor.sh
    fixCommand: "gh auth login --scopes repo"
